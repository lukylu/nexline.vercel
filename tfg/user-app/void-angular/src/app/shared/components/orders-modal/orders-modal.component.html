<!-- ORDERS MODAL -->
<div class="popup-overlay" [class.open]="isOpen()" (click)="close()"></div>
<div class="popup-box" [class.open]="isOpen()" style="max-width:720px;">
  <div class="popup-content" style="width:100%;padding:2rem;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;">
      <h2 class="popup-name" style="font-size:1.8rem;">MIS PEDIDOS</h2>
      <button class="popup-close" (click)="close()">✕</button>
    </div>
    <div id="ordersList">
      <div class="order-item" style="border:1px solid var(--gray2);padding:1rem;margin-bottom:.75rem;background:var(--black);">
        <div style="display:flex;justify-content:space-between;margin-bottom:.5rem;">
          <span style="font-family:var(--fm);font-size:9px;letter-spacing:.15em;color:var(--muted);">ORD-001</span>
          <span style="font-family:var(--fm);font-size:9px;letter-spacing:.15em;color:var(--lime);">ENTREGADO</span>
        </div>
        <div style="font-size:12px;color:var(--white);margin-bottom:.25rem;">Hoodie OVERSIZED Black</div>
        <div style="display:flex;justify-content:space-between;">
          <span style="font-size:10px;color:var(--muted);">15 Abr 2025</span>
          <span style="font-family:var(--fm);font-size:11px;font-weight:700;">89,00 €</span>
        </div>
      </div>
      <div class="order-item" style="border:1px solid var(--gray2);padding:1rem;background:var(--black);">
        <div style="display:flex;justify-content:space-between;margin-bottom:.5rem;">
          <span style="font-family:var(--fm);font-size:9px;letter-spacing:.15em;color:var(--muted);">ORD-002</span>
          <span style="font-family:var(--fm);font-size:9px;letter-spacing:.15em;color:var(--accent);">EN CAMINO</span>
        </div>
        <div style="font-size:12px;color:var(--white);margin-bottom:.25rem;">Tee Essential White + Cazadora Bomber</div>
        <div style="display:flex;justify-content:space-between;">
          <span style="font-size:10px;color:var(--muted);">18 Abr 2025</span>
          <span style="font-family:var(--fm);font-size:11px;font-weight:700;">134,00 €</span>
        </div>
      </div>
    </div>
  </div>
</div>
