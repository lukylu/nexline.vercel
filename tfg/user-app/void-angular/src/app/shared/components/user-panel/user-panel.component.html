<!-- ══ USER PANEL ══ -->
<div class="user-panel-overlay" [class.open]="isOpen()" (click)="close()"></div>
<div class="user-panel" [class.open]="isOpen()">
  <div class="user-panel-header">
    <div class="user-avatar" id="userPanelAvatar">U</div>
    <div class="user-info">
      <div class="user-name" id="userPanelName">{{ authService.currentUser()?.name || 'Usuario' }}</div>
      <div class="user-email" id="userPanelEmail">{{ authService.currentUser()?.email || 'usuario@email.com' }}</div>
    </div>
    <button class="user-panel-close" (click)="close()" aria-label="Cerrar panel">✕</button>
  </div>
  <div class="user-panel-body">
    <div class="user-menu-section-title">Cuenta</div>
    <a class="user-menu-item" (click)="close()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
      <span>Mi Perfil</span>
    </a>
    <a class="user-menu-item" (click)="openOrders()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"></path><path d="M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path></svg>
      <span>Mis Pedidos</span>
      <span class="badge" id="userOrdersCount">0</span>
    </a>
    <a class="user-menu-item" (click)="openWishlist()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"></path></svg>
      <span>Wishlist</span>
      <span class="badge" id="userWishCount">{{ wishlistCount() }}</span>
    </a>
    
    <div class="user-menu-divider"></div>
    <div class="user-menu-section-title">Actividad</div>
    <a class="user-menu-item" (click)="close()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
      <span>Historial</span>
    </a>
    <a class="user-menu-item" (click)="close()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M15 5v2m0 4v2m0 4v2M5 5a2 2 0 00-2 2v3a2 2 0 110 4v3a2 2 0 002 2h14a2 2 0 002-2v-3a2 2 0 110-4V7a2 2 0 00-2-2H5z"></path></svg>
      <span>Cupones</span>
    </a>
    
    <div class="user-menu-divider"></div>
    <div class="user-menu-section-title">Configuración</div>
    <a class="user-menu-item" (click)="close()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"></path></svg>
      <span>Ajustes</span>
    </a>
    <a class="user-menu-item" (click)="close()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"></path></svg>
      <span>Tema Oscuro</span>
    </a>
  </div>
  <div class="user-panel-footer">
    <button class="user-logout-btn" (click)="logout()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><polyline points="21 12 9 12"></polyline></svg>
      CERRAR SESIÓN
    </button>
  </div>
</div>
