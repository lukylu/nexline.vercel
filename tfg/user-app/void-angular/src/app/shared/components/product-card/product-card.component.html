@if (product) {
  <div class="pc reveal" [class.sold-out]="product.stock === 0" (click)="openDetail(product)" voidReveal>
    <div class="pimg-wrap">
      @if (product.badge) {
        <span class="pbadge" [class]="'b-' + product.badge.toLowerCase()">{{product.badge}}</span>
      }
      @if (product.stock === 0) {
        <span class="pbadge b-sold">AGOTADO</span>
      }
      <img [src]="getMainImage()" [alt]="product.name" class="pimg" [class.pimg-contain]="product.cat === 'sneakers'">
      
      <button class="pwish" [class.liked]="isInWishlist()" (click)="toggleWishlist($event, product)" aria-label="Guardar en wishlist">
        {{ isInWishlist() ? '♥' : '♡' }}
      </button>
      
      @if (product.stock !== undefined && product.stock > 0) {
        <button class="pqa" (click)="quickAdd($event, product)">
          <span>+</span> AÑADIR RÁPIDO
        </button>
      }
    </div>
    
    <div class="pinfo">
      <div class="pname">{{product.name}}</div>
      <div class="psub">{{product.sub}}</div>
      <div class="pfooter">
        <div class="pprice">
          @if (product.old_price) {
            <span class="old">{{product.old_price}}€</span>
            <span class="sale">{{product.price}}€</span>
          } @else {
            {{product.price}}€
          }
        </div>
        <div class="pswaches">
          <div class="psw active" [style.background]="product.color"></div>
        </div>
      </div>
    </div>
  </div>
}
