<!-- ══ AUTH MODAL ══ -->
<div class="auth-overlay" [class.open]="isOpen()" (click)="close()"></div>
<div class="auth-modal" [class.open]="isOpen()" role="dialog" aria-modal="true" aria-label="Acceso a cuenta">
  <div class="auth-bar"></div>
  <div class="auth-body">
    <button class="auth-close" (click)="close()" aria-label="Cerrar">✕</button>
    <p class="auth-eyebrow" id="authEyebrow">Acceso</p>
    <h2 class="auth-title" id="authTitle">ENTRA<br>AL <span style="color:var(--accent)">VOID.</span></h2>
    <p class="auth-sub" id="authSub">Inicia sesión para guardar favoritos, acceder a tu carrito y drops exclusivos.</p>
    <div class="auth-tabs">
      <button class="auth-tab" [class.active]="tab() === 'login'" (click)="tab.set('login')">Iniciar sesión</button>
      <button class="auth-tab" [class.active]="tab() === 'register'" (click)="tab.set('register')">Registrarse</button>
    </div>
    <!-- LOGIN FORM -->
    @if (tab() === 'login') {
      <div id="formLogin">
        <div class="auth-form">
          <div class="auth-field">
            <label class="auth-label" for="loginEmail">Email</label>
            <input class="auth-input" type="email" id="loginEmail" placeholder="tu@email.com" autocomplete="email">
          </div>
          <div class="auth-field">
            <label class="auth-label" for="loginPass">Contraseña</label>
            <input class="auth-input" type="password" id="loginPass" placeholder="••••••••" autocomplete="current-password">
          </div>
          <button class="auth-btn" (click)="submitLogin()"><span>Entrar →</span></button>
        </div>
        <p class="auth-switch">¿No tienes cuenta? <a (click)="tab.set('register')">Regístrate gratis</a></p>
      </div>
    }
    <!-- REGISTER FORM -->
    @if (tab() === 'register') {
      <div id="formRegister">
        <div class="auth-form">
          <div class="auth-field">
            <label class="auth-label" for="regName">Nombre</label>
            <input class="auth-input" type="text" id="regName" placeholder="Tu nombre" autocomplete="name">
          </div>
          <div class="auth-field">
            <label class="auth-label" for="regEmail">Email</label>
            <input class="auth-input" type="email" id="regEmail" placeholder="tu@email.com" autocomplete="email">
          </div>
          <div class="auth-field">
            <label class="auth-label" for="regPass">Contraseña</label>
            <input class="auth-input" type="password" id="regPass" placeholder="Mín. 6 caracteres" autocomplete="new-password">
          </div>
          <button class="auth-btn" (click)="submitRegister()"><span>Crear cuenta →</span></button>
        </div>
        <p class="auth-switch">¿Ya tienes cuenta? <a (click)="tab.set('login')">Inicia sesión</a></p>
      </div>
    }
  </div>
</div>
