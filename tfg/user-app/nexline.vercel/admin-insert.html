
<!-- ════════════════════════════════════════════════════════
     ADMIN PANEL HTML
     ════════════════════════════════════════════════════════ -->

<!-- Admin Login Modal -->
<div class="admin-login-overlay" id="adminLoginOverlay" onclick="closeAdminLogin()"></div>
<div class="admin-login-modal" id="adminLoginModal">
  <div class="admin-login-bar"></div>
  <div class="admin-login-body">
    <button class="admin-login-close" onclick="closeAdminLogin()">✕</button>
    <p class="admin-login-eyebrow">Administración</p>
    <h2 class="admin-login-title">ACCESO <span>ADMIN</span></h2>
    <p class="admin-login-sub">Introduce la contraseña de administrador para gestionar productos y pedidos.</p>
    <div class="admin-login-form">
      <div class="admin-login-field">
        <label class="admin-login-label" for="adminPassword">Contraseña</label>
        <input class="admin-login-input" type="password" id="adminPassword" placeholder="••••••••" onkeypress="if(event.key==='Enter')submitAdminLogin()">
        <span class="admin-login-error" id="adminPasswordErr">Contraseña incorrecta</span>
      </div>
      <button class="admin-login-btn" onclick="submitAdminLogin()"><span>ACCEDER →</span></button>
    </div>
  </div>
</div>

<!-- Admin Panel -->
<div class="admin-panel-overlay" id="adminPanelOverlay" onclick="closeAdminPanel()"></div>
<div class="admin-panel" id="adminPanel">
  <div class="admin-panel-header">
    <h3 class="admin-panel-title">PANEL <span>ADMIN</span></h3>
    <button class="admin-panel-close" onclick="closeAdminPanel()">✕</button>
  </div>
  <div class="admin-panel-body">
    <div class="admin-tabs">
      <button class="admin-tab active" id="tab-dashboard" onclick="switchAdminTab('dashboard')">Dashboard</button>
      <button class="admin-tab" id="tab-products" onclick="switchAdminTab('products')">Productos</button>
      <button class="admin-tab" id="tab-orders" onclick="switchAdminTab('orders')">Pedidos</button>
    </div>

    <!-- Dashboard Content -->
    <div class="admin-content active" id="content-dashboard">
      <div class="admin-stats-grid">
        <div class="admin-stat-card">
          <div class="admin-stat-num" id="stat-revenue">0€</div>
          <div class="admin-stat-label">Ingresos Totales</div>
        </div>
        <div class="admin-stat-card lime">
          <div class="admin-stat-num" id="stat-orders">0</div>
          <div class="admin-stat-label">Pedidos</div>
        </div>
        <div class="admin-stat-card">
          <div class="admin-stat-num" id="stat-products">0</div>
          <div class="admin-stat-label">Productos</div>
        </div>
        <div class="admin-stat-card lime">
          <div class="admin-stat-num" id="stat-pending">0</div>
          <div class="admin-stat-label">Pendientes</div>
        </div>
      </div>
    </div>

    <!-- Products Content -->
    <div class="admin-content" id="content-products">
      <button class="admin-btn-add" onclick="showAddProductForm()">+ NUEVO PRODUCTO</button>
      <div class="admin-product-list" id="adminProductsList"></div>
    </div>

    <!-- Product Form -->
    <div class="admin-content" id="content-product-form">
      <h3 class="admin-panel-title" id="productFormTitle" style="margin-bottom:1.5rem;font-size:1.5rem;">NUEVO PRODUCTO</h3>
      <form class="admin-form" onsubmit="saveProduct(event)">
        <input type="hidden" id="productId">
        <div class="admin-form-group">
          <label>Nombre</label>
          <input type="text" id="productName" required>
        </div>
        <div class="admin-form-group">
          <label>Precio (€)</label>
          <input type="number" step="0.01" id="productPrice" required>
        </div>
        <div class="admin-form-group admin-form-full">
          <label>Descripción</label>
          <textarea id="productDescription"></textarea>
        </div>
        <div class="admin-form-group">
          <label>Categoría</label>
          <select id="productCategory">
            <option value="best_sellers">Best Sellers</option>
            <option value="hoodies">Hoodies</option>
            <option value="tees">Tees</option>
            <option value="pants">Pants</option>
            <option value="footwear">Footwear</option>
            <option value="accesorios">Accesorios</option>
          </select>
        </div>
        <div class="admin-form-group">
          <label>Stock</label>
          <input type="number" id="productStock" value="0">
        </div>
        <div class="admin-form-group admin-form-full">
          <label>Imágenes (URLs separadas por coma)</label>
          <input type="text" id="productImages">
        </div>
        <div class="admin-form-actions">
          <button type="submit" class="admin-btn-save">GUARDAR</button>
          <button type="button" class="admin-btn-cancel" onclick="closeProductForm()">CANCELAR</button>
        </div>
      </form>
    </div>

    <!-- Orders Content -->
    <div class="admin-content" id="content-orders">
      <div id="adminOrdersList"></div>
    </div>
  </div>
</div>

<script src="admin-panel.js"></script>
</body>
